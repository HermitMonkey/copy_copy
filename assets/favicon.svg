<svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Rounded Rect for the base 'Copy' sheet -->
  <rect x="2" y="5" width="8" height="9" rx="1.5" fill="#3B82F6" fill-opacity="0.8"/>
  
  <!-- Foreground Rounded Rect for the 'Top' sheet -->
  <rect x="6" y="2" width="8" height="9" rx="1.5" fill="url(#paint0_linear)" stroke="#1E293B" stroke-width="0.5"/>
  
  <!-- Simplified Phoenix Wing/Profile inside the top sheet -->
  <path d="M7.5 5.5C8.5 4.5 10 4 11.5 4.5C12.5 4.8 13.5 6 13 8C12 7.5 11 7.2 10 7.2C10 8.5 9.5 9.5 8 10C8.5 8.5 8.2 7.2 7.5 5.5Z" fill="#FBBF24"/>
  
  <!-- Glow effect to mimic the 'modern' feel -->
  <circle cx="11" cy="5" r="3" fill="#FBBF24" fill-opacity="0.3" filter="url(#filter0_f)"/>

  <defs>
    <filter id="filter0_f" x="6" y="0" width="10" height="10" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="1"/>
    </filter>
    <linearGradient id="paint0_linear" x1="6" y1="2" x2="14" y2="11" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
</svg>